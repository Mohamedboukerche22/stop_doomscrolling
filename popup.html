<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 200px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 20px;
      background: #f4f4f9;
    }
    h2 { color: #2c3e50; font-size: 1.2rem; margin-bottom: 10px; }
    p { color: #7f8c8d; font-size: 0.9rem; }
    .status {
      display: inline-block;
      padding: 5px 10px;
      background: #27ae60;
      color: white;
      border-radius: 20px;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h2>Focus Mode</h2>
  <p>Distractions are currently blocked.</p>
  <div class="status">ACTIVE</div>
</body>
</html>
